name: Ansible

# Manual trigger only — use this to apply vault secret changes to the server.
# Runs on the self-hosted runner (on the server) using a local connection.
# No SSH required. The clive user owns /etc/clive/secrets.env.
# Restarts all services after writing the updated secrets file.
on:
  workflow_dispatch:

jobs:
  update-secrets:
    name: Update secrets and restart services
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible
        run: pip3 install ansible --quiet

      - name: Write vault password file
        run: |
          echo "${{ secrets.ANSIBLE_VAULT_PASSWORD }}" > /tmp/vault_pass
          chmod 600 /tmp/vault_pass

      - name: Write secrets file from vault
        working-directory: infrastructure/ansible
        run: |
          ansible-playbook \
            secrets.yml \
            --vault-password-file /tmp/vault_pass

      - name: Restart services to pick up new secrets
        run: |
          docker restart clive-processing clive-query clive-telegram clive-orchestrator

      - name: Clean up vault password file
        if: always()
        run: rm -f /tmp/vault_pass
