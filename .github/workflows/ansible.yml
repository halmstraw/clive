name: Ansible

# Manual dispatch only — D-091 principle applied to Ansible too.
# Use this workflow for routine day-2 operations on the production VM:
#   - After adding or rotating GitHub Secrets
#   - After changes to Ansible roles or observability config
#
# This workflow runs only the 'day2' tagged play (clive-secrets, compose-deploy,
# postgres-init). These roles write only to paths owned by the clive user —
# no sudo required, no root exposure from the CI runner.
#
# For initial VM provisioning (base, docker, backup-cron, github-runner) run
# the full playbook locally as root:
#   ansible-playbook -i infrastructure/ansible/inventory \
#     --extra-vars "@/tmp/clive_vars.json" \
#     infrastructure/ansible/playbook.yml
#
# vars are sourced entirely from GitHub Secrets — no vault.yml required.

on:
  workflow_dispatch:
    inputs:
      runner_token:
        description: >-
          GitHub Actions runner registration token. Only needed when
          re-registering the runner (Settings → Actions → Runners → New).
          Leave empty to skip runner re-registration.
        required: false
        default: ""

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  ansible:
    name: Run Ansible playbook
    runs-on: self-hosted   # D-090 — runner is on the VM; no inbound SSH needed
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install Ansible and required collections
        # Ubuntu disables ensurepip — install via apt (no sudo needed for galaxy).
        # Day-2 play runs as clive (become: false) so sudo is never required.
        run: |
          sudo apt-get install -y --no-install-recommends ansible
          ansible-galaxy collection install -r infrastructure/ansible/requirements.yml

      - name: Generate vars file from GitHub Secrets
        # Uses Python to build a JSON file — handles all quoting edge cases.
        # File is mode 0600 (owner-only) and deleted in the always() cleanup step.
        env:
          TELEGRAM_BOT_TOKEN:            ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_CHAT_ID:        ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          ANTHROPIC_API_KEY:             ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:                ${{ secrets.OPENAI_API_KEY }}
          POSTGRES_PASSWORD:             ${{ secrets.POSTGRES_PASSWORD }}
          APP_DB_PASSWORD:               ${{ secrets.APP_DB_PASSWORD }}
          AUDIT_WRITER_PASSWORD:         ${{ secrets.AUDIT_WRITER_PASSWORD }}
          MINIO_ROOT_USER:               ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD:           ${{ secrets.MINIO_ROOT_PASSWORD }}
          SEARCH_API_KEY:                ${{ secrets.SEARCH_API_KEY }}
          DASHBOARD_SECRET:              ${{ secrets.DASHBOARD_SECRET }}
          GRAFANA_CLOUD_PROMETHEUS_URL:  ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_URL }}
          GRAFANA_CLOUD_PROMETHEUS_USER: ${{ secrets.GRAFANA_CLOUD_PROMETHEUS_USER }}
          GRAFANA_CLOUD_LOKI_URL:        ${{ secrets.GRAFANA_CLOUD_LOKI_URL }}
          GRAFANA_CLOUD_LOKI_USER:       ${{ secrets.GRAFANA_CLOUD_LOKI_USER }}
          GRAFANA_CLOUD_API_KEY:         ${{ secrets.GRAFANA_CLOUD_API_KEY }}
          BACKUP_S3_ENDPOINT:            ${{ secrets.BACKUP_S3_ENDPOINT }}
          BACKUP_S3_ACCESS_KEY:          ${{ secrets.BACKUP_S3_ACCESS_KEY }}
          BACKUP_S3_SECRET_KEY:          ${{ secrets.BACKUP_S3_SECRET_KEY }}
          OWNER_IP:                      ${{ secrets.OWNER_IP }}
          RUNNER_TOKEN:                  ${{ inputs.runner_token }}
        run: |
          python3 - << 'EOF'
          import os, json, stat

          mapping = {
              "telegram_bot_token":           "TELEGRAM_BOT_TOKEN",
              "telegram_owner_chat_id":       "TELEGRAM_OWNER_CHAT_ID",
              "anthropic_api_key":            "ANTHROPIC_API_KEY",
              "openai_api_key":               "OPENAI_API_KEY",
              "postgres_password":            "POSTGRES_PASSWORD",
              "app_db_password":              "APP_DB_PASSWORD",
              "audit_writer_password":        "AUDIT_WRITER_PASSWORD",
              "minio_root_user":              "MINIO_ROOT_USER",
              "minio_root_password":          "MINIO_ROOT_PASSWORD",
              "search_api_key":               "SEARCH_API_KEY",
              "dashboard_secret":             "DASHBOARD_SECRET",
              "grafana_cloud_prometheus_url":  "GRAFANA_CLOUD_PROMETHEUS_URL",
              "grafana_cloud_prometheus_user": "GRAFANA_CLOUD_PROMETHEUS_USER",
              "grafana_cloud_loki_url":        "GRAFANA_CLOUD_LOKI_URL",
              "grafana_cloud_loki_user":       "GRAFANA_CLOUD_LOKI_USER",
              "grafana_cloud_api_key":         "GRAFANA_CLOUD_API_KEY",
              "backup_s3_endpoint":           "BACKUP_S3_ENDPOINT",
              "backup_s3_access_key":         "BACKUP_S3_ACCESS_KEY",
              "backup_s3_secret_key":         "BACKUP_S3_SECRET_KEY",
              "owner_ip":                     "OWNER_IP",
              "runner_token":                 "RUNNER_TOKEN",
          }

          vars = {
              ansible_key: os.environ[env_key]
              for ansible_key, env_key in mapping.items()
              if os.environ.get(env_key)
          }

          path = "/tmp/clive_vars.json"
          with open(path, "w") as f:
              json.dump(vars, f)
          os.chmod(path, stat.S_IRUSR | stat.S_IWUSR)  # 0600

          populated = [k for k, v in mapping.items() if os.environ.get(v)]
          missing   = [k for k, v in mapping.items() if not os.environ.get(v) and v != "RUNNER_TOKEN"]
          print(f"Vars file written: {len(populated)} populated, {len(missing)} empty")
          if missing:
              print(f"Missing (will use role defaults if any): {missing}")
          EOF

      - name: Run Ansible playbook (day-2 operations only)
        # Runs only the 'day2' tagged play — no root required.
        # For initial VM setup run the full playbook locally as root.
        run: |
          ansible-playbook \
            -i infrastructure/ansible/inventory.ci \
            --tags day2 \
            --extra-vars "@/tmp/clive_vars.json" \
            infrastructure/ansible/playbook.yml

      - name: Clean up vars file
        if: always()
        run: rm -f /tmp/clive_vars.json
