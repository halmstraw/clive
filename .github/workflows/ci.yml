name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  lint-validate:
    name: Lint and validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Terraform format check
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.7"
      - run: terraform fmt --check
        working-directory: infrastructure/terraform

      - name: Terraform validate
        run: |
          terraform init -backend=false
          terraform validate
        working-directory: infrastructure/terraform

      - name: Ansible lint
        # No vault password needed — vault.yml removed; vars sourced from GitHub Secrets
        # via .github/workflows/ansible.yml. Lint checks structure only.
        run: |
          pip install ansible-lint
          ansible-galaxy collection install -r infrastructure/ansible/requirements.yml
          ansible-lint infrastructure/ansible/playbook.yml

      - name: Create stub secrets file for Compose validation (D-084)
        run: |
          sudo mkdir -p /etc/clive
          # Generate empty-value stub from the secrets listed in .env.example
          grep -E '^#\s+[A-Z_]+=\s*$' infrastructure/compose/.env.example \
            | sed 's/^#[[:space:]]*//' \
            | sudo tee /etc/clive/secrets.env > /dev/null
          sudo chmod 644 /etc/clive/secrets.env

      - name: Docker Compose config dry-run
        run: docker compose -f infrastructure/compose/docker-compose.yml config --quiet
        env:
          ORCHESTRATOR_IMAGE_TAG: latest
          QUERY_IMAGE_TAG: latest
          TELEGRAM_IMAGE_TAG: latest
          PROCESSING_IMAGE_TAG: latest
          DASHBOARD_IMAGE_TAG: latest

  test:
    name: Test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: clive_test
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run SQL init scripts (idempotency test)
        run: |
          for f in infrastructure/sql/init/*.sql; do
            echo "Running $f..."
            PGPASSWORD=testpassword psql -h localhost -U postgres -d clive_test -f "$f"
          done
          # Run twice to verify idempotency
          for f in infrastructure/sql/init/*.sql; do
            echo "Re-running $f (idempotency check)..."
            PGPASSWORD=testpassword psql -h localhost -U postgres -d clive_test -f "$f"
          done
        env:
          PGPASSWORD: testpassword

      - name: Run SQL init scripts (schema setup for integration tests)
        env:
          PGPASSWORD: testpassword
        run: |
          for f in $(ls infrastructure/sql/init/*.sql | sort); do
            echo "Running $f..."
            psql -h localhost -U postgres -d clive_test -f "$f"
          done

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run orchestrator unit + integration tests
        env:
          TEST_DB_URL: "postgresql://postgres:testpassword@localhost:5432/clive_test"
        run: |
          pip install -e ".[dev]"
          python -m pytest tests/ -v --cov=orchestrator --cov-report=xml:coverage.xml --cov-fail-under=90
        working-directory: src/orchestrator

      - name: Run query service unit tests
        run: |
          pip install -e ".[dev]"
          python -m pytest tests/ -v --cov=query --cov-report=xml:coverage.xml --cov-fail-under=90
        working-directory: src/query

      - name: Run telegram rendering tests
        run: |
          pip install -e ".[dev]"
          python -m pytest tests/ -v --cov=clive_telegram --cov-report=xml:coverage.xml --cov-fail-under=90
        working-directory: src/telegram

      - name: Run processing service unit tests
        run: |
          pip install -e ".[dev]"
          python -m pytest tests/ -v --cov=processing --cov-report=xml:coverage.xml --cov-fail-under=90
        working-directory: src/processing

      - name: Run dashboard service tests (v0.11, D-147)
        run: |
          pip install -e ".[dev]"
          python -m pytest tests/ -v --cov=clive_dashboard --cov-report=xml:coverage.xml --cov-fail-under=90
        working-directory: src/dashboard

      - name: SonarCloud scan
        uses: SonarSource/sonarcloud-github-action@master
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  test-db:
    name: Database role privilege tests
    runs-on: ubuntu-latest
    needs: lint-validate
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_DB: clive
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: testpassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - name: Run SQL init scripts
        env:
          PGPASSWORD: testpassword
        run: |
          for f in $(ls infrastructure/sql/init/*.sql | sort); do
            echo "Running $f..."
            psql -h localhost -U postgres -d clive -f "$f"
          done

      - name: Assert clive_audit_writer can INSERT into event_log
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_audit_writer; \
             INSERT INTO clive_audit.event_log \
               (event_id, event_type, source_block, timestamp, \
                payload_hash, alignment_result, routing_outcome, zone_scope) \
             VALUES \
               (gen_random_uuid(), 'test', 13, now(), \
                'hash', 'pass', 'test', 'personal');"

      - name: Assert clive_audit_writer cannot UPDATE event_log
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_audit_writer; \
             UPDATE clive_audit.event_log SET zone_scope = 'personal' WHERE false;" \
            2>&1 | grep -q "permission denied"

      - name: Assert clive_audit_writer cannot DELETE from event_log
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_audit_writer; \
             DELETE FROM clive_audit.event_log WHERE false;" \
            2>&1 | grep -q "permission denied"

      - name: Assert clive_app can SELECT from system_documents
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT count(*) FROM clive_state.system_documents;"

      - name: Assert clive_app cannot access event_log
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT count(*) FROM clive_audit.event_log;" \
            2>&1 | grep -q "permission denied"

      - name: Assert clive_audit_writer cannot read clive_search.chunks
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_audit_writer; \
             SELECT count(*) FROM clive_search.chunks;" \
            2>&1 | grep -q "permission denied"

      - name: Assert clive_app cannot write to audit log
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             INSERT INTO clive_audit.event_log \
               (event_id, event_type, source_block, timestamp, \
                payload_hash, alignment_result, routing_outcome, zone_scope) \
             VALUES \
               (gen_random_uuid(), 'test', 13, now(), \
                'hash', 'pass', 'test', 'personal');" \
            2>&1 | grep -q "permission denied"

      - name: Assert clive_app can access pending_actions (v0.3, D-106)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT count(*) FROM clive_state.pending_actions;"

      - name: Assert clive_app can access feedback (v0.3, D-106)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT count(*) FROM clive_state.feedback;"

      - name: Assert clive_app can access memory_entities (v0.7, D-128)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT count(*) FROM clive_state.memory_entities;"

      - name: Assert clive_app can access conversation_summaries (v0.7, D-128)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT count(*) FROM clive_state.conversation_summaries;"

      - name: Assert zone 'personal' exists in zones table (v0.10, D-143)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT 1 FROM clive_state.zones WHERE zone_name = 'personal';" \
            | grep -q "1 row"

      - name: Assert owner user row exists in users table (v0.10, D-144)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT telegram_chat_id, role, zone_access FROM clive_state.users LIMIT 1;"

      - name: Assert tool_registry rows have zone_permissions (v0.10, D-143)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT count(*) FROM clive_state.tool_registry \
             WHERE zone_permissions IS NULL OR zone_permissions = '{}';" \
            | grep -q "0"

      - name: Assert pending_actions has zone_scope column (v0.10, D-144)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT zone_scope FROM clive_state.pending_actions LIMIT 1;"

      - name: Assert web_sessions table exists (v0.11, D-146)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT count(*) FROM clive_state.web_sessions;"

      - name: Assert web_sessions has correct columns (v0.11, D-146)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT session_token, user_id, created_at, expires_at, last_seen_at \
             FROM clive_state.web_sessions LIMIT 1;"

      - name: Assert config table exists (v0.12, D-149)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT count(*) FROM clive_state.config;"

      - name: Assert config table has correct columns (v0.12, D-149)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             SELECT config_key, config_value, updated_at, updated_by \
             FROM clive_state.config LIMIT 1;"

      - name: Assert clive_app cannot CREATE tables (least-privilege check)
        env:
          PGPASSWORD: testpassword
        run: |
          psql -h localhost -U postgres -d clive -c \
            "SET ROLE clive_app; \
             CREATE TABLE clive_state.test_should_fail (id int);" \
            2>&1 | grep -q "permission denied"
