name: Deploy

on:
  push:
    branches: [main]

jobs:
  build:
    name: Build images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      orchestrator_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push orchestrator image
        uses: docker/build-push-action@v5
        with:
          context: src/orchestrator
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/clive-orchestrator:${{ steps.meta.outputs.sha }}

      - name: Build and push query image
        uses: docker/build-push-action@v5
        with:
          context: src/query
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/clive-query:${{ steps.meta.outputs.sha }}

      - name: Build and push telegram image
        uses: docker/build-push-action@v5
        with:
          context: src/telegram
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/clive-telegram:${{ steps.meta.outputs.sha }}

      - name: Build and push processing image
        uses: docker/build-push-action@v5
        with:
          context: src/processing
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/clive-processing:${{ steps.meta.outputs.sha }}

  deploy:
    name: Deploy to production
    runs-on: self-hosted
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 12); do
            docker exec clive-postgres pg_isready -U postgres -d clive && break
            echo "Waiting for PostgreSQL... ($i/12)"
            sleep 5
          done
          docker exec clive-postgres pg_isready -U postgres -d clive

      - name: Apply database migrations
        run: |
          PGPASSWORD=$(grep '^POSTGRES_PASSWORD=' /etc/clive/secrets.env | cut -d= -f2 | tr -d '\r')
          for f in $(ls infrastructure/sql/init/*.sql | sort); do
            echo "Applying migration: $f"
            docker exec -e PGPASSWORD="$PGPASSWORD" -i clive-postgres \
              psql -U postgres -d clive < "$f"
          done

      - name: Ensure MinIO raw store bucket exists
        run: |
          MINIO_ROOT_USER=$(grep '^MINIO_ROOT_USER=' /etc/clive/secrets.env | cut -d= -f2 | tr -d '\r')
          MINIO_ROOT_PASSWORD=$(grep '^MINIO_ROOT_PASSWORD=' /etc/clive/secrets.env | cut -d= -f2 | tr -d '\r')
          RAW_BUCKET=$(grep '^MINIO_RAW_BUCKET=' /etc/clive/secrets.env | cut -d= -f2 | tr -d '\r')
          RAW_BUCKET=${RAW_BUCKET:-clive-raw-store}
          docker run --rm \
            --network container:clive-minio \
            -e MC_HOST_local="http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@localhost:9000" \
            minio/mc mb --ignore-existing "local/${RAW_BUCKET}"

      - name: Seed system documents
        run: |
          docker compose -f infrastructure/compose/docker-compose.yml \
            build seed
          docker compose -f infrastructure/compose/docker-compose.yml \
            run --rm seed

      - name: Sync compose file to /home/clive/compose
        run: |
          cp infrastructure/compose/docker-compose.yml \
            /home/clive/compose/docker-compose.yml

      - name: Deploy services
        env:
          ORCHESTRATOR_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          QUERY_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          TELEGRAM_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          PROCESSING_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
        run: |
          docker compose -f infrastructure/compose/docker-compose.yml \
            up -d --pull always --no-deps orchestrator query telegram processing

  verify:
    name: Verify deployment
    runs-on: self-hosted
    needs: [build, deploy]
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify containers running
        env:
          ORCHESTRATOR_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          QUERY_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          TELEGRAM_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          PROCESSING_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
        run: |
          docker compose -f infrastructure/compose/docker-compose.yml ps --format json \
          | python3 -c '
          import json, sys
          services = [json.loads(l) for l in sys.stdin if l.strip()]
          failing = [s["Name"] for s in services if s["State"] != "running"]
          if failing:
              print("FAIL:", failing)
              sys.exit(1)
          print("All services running")
          '

      - name: Verify Block 13 health
        run: docker exec clive-orchestrator curl -sf http://localhost:8080/health

      - name: Verify Block 15 health
        run: docker exec clive-processing curl -sf http://localhost:8083/health

      - name: Trigger rollback on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'rollback.yml',
              ref: 'main',
              inputs: { reason: 'verify-failed', sha: context.sha }
            })
