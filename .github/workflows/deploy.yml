name: Deploy

on:
  push:
    branches: [main]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build images
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      orchestrator_tag: ${{ steps.meta.outputs.sha }}
    steps:
      - uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: echo "sha=${GITHUB_SHA::8}" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push orchestrator image
        uses: docker/build-push-action@v5
        with:
          context: src/orchestrator
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/clive-orchestrator:${{ steps.meta.outputs.sha }}

      - name: Build and push query image
        uses: docker/build-push-action@v5
        with:
          context: src/query
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/clive-query:${{ steps.meta.outputs.sha }}

      - name: Build and push telegram image
        uses: docker/build-push-action@v5
        with:
          context: src/telegram
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/clive-telegram:${{ steps.meta.outputs.sha }}

      - name: Build and push processing image
        uses: docker/build-push-action@v5
        with:
          context: src/processing
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/clive-processing:${{ steps.meta.outputs.sha }}

  deploy:
    name: Deploy to production
    runs-on: self-hosted
    needs: build
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Write secrets file
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_OWNER_CHAT_ID: ${{ secrets.TELEGRAM_OWNER_CHAT_ID }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
          AUDIT_WRITER_PASSWORD: ${{ secrets.AUDIT_WRITER_PASSWORD }}
          MINIO_ROOT_USER: ${{ secrets.MINIO_ROOT_USER }}
          MINIO_ROOT_PASSWORD: ${{ secrets.MINIO_ROOT_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
          SEARCH_API_KEY: ${{ secrets.SEARCH_API_KEY }}
        run: |
          {
            echo "TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}"
            echo "TELEGRAM_OWNER_CHAT_ID=${TELEGRAM_OWNER_CHAT_ID}"
            echo "ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}"
            echo "OPENAI_API_KEY=${OPENAI_API_KEY}"
            echo "POSTGRES_PASSWORD=${POSTGRES_PASSWORD}"
            echo "POSTGRES_USER=clive_app"
            echo "POSTGRES_DB=clive"
            echo "APP_DB_PASSWORD=${APP_DB_PASSWORD}"
            echo "AUDIT_WRITER_PASSWORD=${AUDIT_WRITER_PASSWORD}"
            echo "MINIO_ROOT_USER=${MINIO_ROOT_USER}"
            echo "MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}"
            echo "MINIO_ENDPOINT=http://minio:9000"
            echo "GRAFANA_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}"
            echo "GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}"
            echo "GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}"
            echo "SEARCH_API_KEY=${SEARCH_API_KEY}"
          } > /etc/clive/secrets.env
          chmod 600 /etc/clive/secrets.env

      - name: Wait for PostgreSQL to be ready
        run: |
          for i in $(seq 1 12); do
            docker exec clive-postgres pg_isready -U postgres -d clive && break
            echo "Waiting for PostgreSQL... ($i/12)"
            sleep 5
          done
          docker exec clive-postgres pg_isready -U postgres -d clive

      - name: Apply database migrations
        run: |
          PGPASSWORD=$(grep '^POSTGRES_PASSWORD=' /etc/clive/secrets.env | cut -d= -f2 | tr -d '\r')
          for f in $(ls infrastructure/sql/init/*.sql | sort); do
            echo "Applying migration: $f"
            docker exec -e PGPASSWORD="$PGPASSWORD" -i clive-postgres \
              psql -U postgres -d clive < "$f"
          done

      - name: Ensure MinIO raw store bucket exists
        # Read credentials from the running MinIO container — these are always
        # the credentials MinIO will accept, regardless of what is in secrets.env.
        run: |
          MINIO_ROOT_USER=$(docker exec clive-minio printenv MINIO_ROOT_USER)
          MINIO_ROOT_PASSWORD=$(docker exec clive-minio printenv MINIO_ROOT_PASSWORD)
          RAW_BUCKET=${MINIO_RAW_BUCKET:-clive-raw-store}
          docker run --rm \
            --network container:clive-minio \
            -e MC_HOST_local="http://${MINIO_ROOT_USER}:${MINIO_ROOT_PASSWORD}@localhost:9000" \
            minio/mc mb --ignore-existing "local/${RAW_BUCKET}"

      - name: Seed system documents
        run: |
          docker compose -f infrastructure/compose/docker-compose.yml \
            build seed
          docker compose -f infrastructure/compose/docker-compose.yml \
            run --rm seed

      - name: Fix compose directory ownership
        run: |
          # clive has no sudo but can run docker — alpine as root can chown the tree.
          # Must run before any cp to /home/clive/compose/ to avoid permission denied.
          docker run --rm \
            -v /home/clive/compose:/target \
            alpine chown -R "$(id -u):$(id -g)" /target

      - name: Sync compose file to /home/clive/compose
        run: |
          cp infrastructure/compose/docker-compose.yml \
            /home/clive/compose/docker-compose.yml

      - name: Sync observability configs to /home/clive/compose/observability
        run: |
          # Wipe and rebuild the entire config tree on each deploy.
          # All persistent data lives in named Docker volumes — this directory
          # holds only config files, so a full rebuild is safe and eliminates
          # the file-vs-directory confusion caused by prior Docker runs.
          rm -rf /home/clive/compose/observability
          mkdir -p \
            /home/clive/compose/observability/prometheus/rules \
            /home/clive/compose/observability/loki \
            /home/clive/compose/observability/promtail \
            /home/clive/compose/observability/grafana/provisioning/datasources \
            /home/clive/compose/observability/grafana/provisioning/dashboards \
            /home/clive/compose/observability/grafana/provisioning/alerting \
            /home/clive/compose/observability/grafana/dashboards \
            /home/clive/compose/observability/caddy

          cp infrastructure/observability/prometheus/prometheus.yml \
            /home/clive/compose/observability/prometheus/
          cp infrastructure/observability/prometheus/rules/services.yml \
            infrastructure/observability/prometheus/rules/system.yml \
            /home/clive/compose/observability/prometheus/rules/
          cp infrastructure/observability/loki/config.yml \
            /home/clive/compose/observability/loki/
          cp infrastructure/observability/promtail/config.yml \
            /home/clive/compose/observability/promtail/
          cp infrastructure/observability/grafana/provisioning/datasources/datasources.yml \
            /home/clive/compose/observability/grafana/provisioning/datasources/
          cp infrastructure/observability/grafana/provisioning/dashboards/dashboards.yml \
            /home/clive/compose/observability/grafana/provisioning/dashboards/
          cp infrastructure/observability/grafana/provisioning/alerting/contact_points.yml \
            /home/clive/compose/observability/grafana/provisioning/alerting/
          cp infrastructure/observability/grafana/dashboards/system_overview.json \
            /home/clive/compose/observability/grafana/dashboards/
          cp infrastructure/observability/caddy/Caddyfile \
            /home/clive/compose/observability/caddy/

      - name: Deploy services
        env:
          ORCHESTRATOR_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          QUERY_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          TELEGRAM_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          PROCESSING_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
        run: |
          docker compose -f infrastructure/compose/docker-compose.yml \
            up -d --pull always --no-deps orchestrator query telegram processing

      - name: Deploy observability and Caddy services
        env:
          APP_DB_PASSWORD: ${{ secrets.APP_DB_PASSWORD }}
          GRAFANA_ADMIN_PASSWORD: ${{ secrets.GRAFANA_ADMIN_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.GOOGLE_CLIENT_SECRET }}
        run: |
          docker compose -f infrastructure/compose/docker-compose.yml \
            up -d --remove-orphans \
            caddy prometheus loki promtail grafana node-exporter postgres-exporter

  verify:
    name: Verify deployment
    runs-on: self-hosted
    needs: [build, deploy]
    permissions:
      contents: read
      actions: write
    steps:
      - uses: actions/checkout@v4

      - name: Verify containers running
        env:
          ORCHESTRATOR_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          QUERY_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          TELEGRAM_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
          PROCESSING_IMAGE_TAG: ${{ needs.build.outputs.orchestrator_tag }}
        run: |
          # Wait for slow-starting services (e.g. Loki ~14s) before checking state.
          sleep 30
          docker compose -f infrastructure/compose/docker-compose.yml ps --format json \
          | python3 -c '
          import json, sys
          services = [json.loads(l) for l in sys.stdin if l.strip()]
          failing = [s["Name"] for s in services if s["State"] != "running"]
          if failing:
              print("FAIL:", failing)
              sys.exit(1)
          print("All services running")
          '

      - name: Verify Block 13 health
        run: docker exec clive-orchestrator curl -sf http://localhost:8080/health

      - name: Verify Block 15 health
        run: docker exec clive-processing curl -sf http://localhost:8083/health

      - name: Trigger rollback on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'rollback.yml',
              ref: 'main',
              inputs: { reason: 'verify-failed', sha: context.sha }
            })

  e2e:
    name: E2E — D-106 sign-off
    runs-on: self-hosted
    needs: [build, verify]
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Load runtime config from VM secrets file
        # Reads TELEGRAM_OWNER_CHAT_ID (needed for action.pending chat_id payloads)
        # and MINIO_RAW_BUCKET from the on-VM secrets file written by the deploy job.
        # MinIO root credentials are read at test time via docker exec — not here.
        run: |
          SECRETS_FILE=/etc/clive/secrets.env
          CHAT_ID=$(grep '^TELEGRAM_OWNER_CHAT_ID=' "$SECRETS_FILE" \
            | head -1 | cut -d= -f2- | tr -d '"' | tr -d "'" | xargs)
          BUCKET=$(grep '^MINIO_RAW_BUCKET=' "$SECRETS_FILE" \
            | head -1 | cut -d= -f2- | tr -d '"' | tr -d "'" | xargs \
            || echo "clive-raw-store")
          echo "TELEGRAM_OWNER_CHAT_ID=${CHAT_ID}" >> "$GITHUB_ENV"
          echo "MINIO_RAW_BUCKET=${BUCKET:-clive-raw-store}" >> "$GITHUB_ENV"

      - name: Run D-106 E2E test suite
        # The test creates a throwaway document, exercises the full deletion and
        # feedback pipeline, then removes the throwaway in a finally block.
        # The live system is left in the same state it was in before the test ran.
        run: python3 tests/e2e/d106_e2e.py
