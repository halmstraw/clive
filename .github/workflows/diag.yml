name: Diagnostics

on:
  workflow_dispatch:

jobs:
  diag:
    name: Capture diagnostics
    runs-on: self-hosted
    steps:
      - name: Container status
        run: docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Image}}"

      - name: Alloy logs
        run: docker logs clive-alloy --tail 80 2>&1 || echo "clive-alloy container not found"

      - name: Disk usage
        run: df -h /
