name: Diagnose
on:
  workflow_dispatch:
jobs:
  diag:
    runs-on: self-hosted
    steps:
      - name: Check orchestrator document-list endpoint
        run: |
          echo "=== /retrieve/document-list ==="
          docker exec clive-orchestrator curl -sf -X POST http://localhost:8080/retrieve/document-list \
            -H 'Content-Type: application/json' -d '{"zone_scope":"personal"}' || echo "FAILED exit $?"
          
          echo "=== /retrieve/status ==="
          docker exec clive-orchestrator curl -sf -X POST http://localhost:8080/retrieve/status \
            -H 'Content-Type: application/json' -d '{"zone_scope":"personal"}' || echo "FAILED exit $?"
          
          echo "=== conversation_turns table ==="
          docker exec clive-postgres psql -U postgres -d clive -c \
            "SELECT to_regclass('clive_state.conversation_turns');" 2>&1
          
          echo "=== Recent telegram logs ==="
          docker logs clive-telegram --tail 30 2>&1 | grep -E "(ERROR|WARNING|list|status|Exception|Traceback)" || echo "No errors found"
          
          echo "=== Recent orchestrator logs ==="
          docker logs clive-orchestrator --tail 20 2>&1 | grep -E "(ERROR|error|Exception)" || echo "No errors found"
