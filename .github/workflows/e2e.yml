name: E2E — D-106 sign-off

# Run manually. Never on push — this talks to the live bot, ingests and
# deletes a real document, and calls the LLM. Fire it once after deploying
# a new version to verify sign-off criteria.
on:
  workflow_dispatch:
    inputs:
      skip_minio:
        description: "Skip MinIO object verification (1 = skip)"
        required: false
        default: "0"
      reply_timeout:
        description: "Seconds to wait for each bot reply"
        required: false
        default: "60"

jobs:
  e2e:
    name: Telegram E2E test suite
    runs-on: self-hosted
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Install E2E dependencies
        run: pip3 install --quiet -r tests/e2e/requirements.txt

      - name: Run D-106 E2E test suite
        env:
          TELEGRAM_API_ID: ${{ secrets.TELEGRAM_API_ID }}
          TELEGRAM_API_HASH: ${{ secrets.TELEGRAM_API_HASH }}
          TELEGRAM_SESSION_STRING: ${{ secrets.TELEGRAM_SESSION_STRING }}
          CLIVE_BOT_USERNAME: ${{ secrets.CLIVE_BOT_USERNAME }}
          SKIP_MINIO_CHECK: ${{ github.event.inputs.skip_minio }}
          REPLY_TIMEOUT: ${{ github.event.inputs.reply_timeout }}
        run: python3 tests/e2e/d106_e2e.py
