name: Rollback

on:
  workflow_dispatch:
    inputs:
      reason:
        description: Reason for rollback
        required: true
      sha:
        description: SHA to roll back from (will deploy previous SHA)
        required: false

jobs:
  rollback:
    name: Roll back production
    runs-on: self-hosted
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Determine previous SHA
        id: prev
        run: echo "sha=$(git rev-parse HEAD~1 | head -c 8)" >> $GITHUB_OUTPUT

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Deploy previous image
        env:
          ORCHESTRATOR_IMAGE_TAG: ${{ steps.prev.outputs.sha }}
          QUERY_IMAGE_TAG: ${{ steps.prev.outputs.sha }}
          TELEGRAM_IMAGE_TAG: ${{ steps.prev.outputs.sha }}
        run: |
          docker compose -f infrastructure/compose/docker-compose.yml \
            up -d --pull always

      - name: Verify rollback
        run: docker compose -f infrastructure/compose/docker-compose.yml ps

      - name: Log rollback event
        run: |
          echo "ROLLBACK: from ${{ inputs.sha }} to ${{ steps.prev.outputs.sha }}, reason: ${{ inputs.reason }}"
