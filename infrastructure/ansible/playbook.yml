---
- name: Configure CLIVE production server
  hosts: clive
  become: true
  # vars are passed via --extra-vars "@/tmp/clive_vars.json" sourced from GitHub Secrets.
  # For the GitHub Actions workflow see .github/workflows/ansible.yml.
  # For local / first-time runs see infrastructure/ansible/vault.example.yml
  # for the full list of required variables.

  roles:
    - base
    - docker
    - clive-secrets
    - compose-deploy
    - postgres-init
    - backup-cron
    - github-runner
