---
- name: Download rclone install script
  ansible.builtin.get_url:
    url: https://rclone.org/install.sh
    dest: /tmp/rclone-install.sh
    mode: "0755"

- name: Install rclone
  ansible.builtin.command:
    cmd: /tmp/rclone-install.sh
    creates: /usr/bin/rclone

- name: Write rclone config to /etc/clive/rclone.conf
  ansible.builtin.template:
    src: rclone.conf.j2
    dest: /etc/clive/rclone.conf
    owner: root
    group: root
    mode: "0600"
  no_log: true

- name: Remove insecure rclone config from clive home if present
  ansible.builtin.file:
    path: /home/clive/.config/rclone/rclone.conf
    state: absent

- name: Create backup log directory
  ansible.builtin.file:
    path: /var/log/clive
    state: directory
    owner: clive
    group: clive
    mode: "0750"

- name: Write backup script
  ansible.builtin.copy:
    dest: /usr/local/bin/clive-backup
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      LOG=/var/log/clive/backup.log
      DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      echo "[${DATE}] Starting MinIO backup" >> $LOG
      rclone sync minio-local:{{ minio_raw_bucket }} minio-backup:{{ minio_raw_bucket }}-backup \
        --log-file $LOG --log-level INFO
      echo "[${DATE}] Backup complete" >> $LOG

- name: Schedule nightly backup cron job
  ansible.builtin.cron:
    name: clive-minio-backup
    user: clive
    hour: "2"
    minute: "0"
    job: >-
      docker compose -f /home/clive/compose/docker-compose.yml
      run --rm backup >> /var/log/clive/backup.log 2>&1
