---
- name: Download rclone install script
  ansible.builtin.get_url:
    url: https://rclone.org/install.sh
    dest: /tmp/rclone-install.sh
    mode: "0755"

- name: Install rclone
  ansible.builtin.command:
    cmd: /tmp/rclone-install.sh
    creates: /usr/bin/rclone

- name: Create rclone config directory
  ansible.builtin.file:
    path: /home/clive/.config/rclone
    state: directory
    owner: clive
    group: clive
    mode: "0700"

- name: Write rclone config for MinIO backup target
  ansible.builtin.copy:
    dest: /home/clive/.config/rclone/rclone.conf
    owner: clive
    group: clive
    mode: "0600"
    content: |
      [minio-local]
      type = s3
      provider = Minio
      endpoint = http://localhost:9000
      access_key_id = {{ minio_root_user }}
      secret_access_key = {{ minio_root_password }}

      [minio-backup]
      type = s3
      provider = Other
      endpoint = {{ backup_s3_endpoint }}
      access_key_id = {{ backup_s3_access_key }}
      secret_access_key = {{ backup_s3_secret_key }}
  no_log: true

- name: Create backup log directory
  ansible.builtin.file:
    path: /var/log/clive
    state: directory
    owner: clive
    group: clive
    mode: "0750"

- name: Write backup script
  ansible.builtin.copy:
    dest: /usr/local/bin/clive-backup
    owner: root
    group: root
    mode: "0755"
    content: |
      #!/bin/bash
      set -euo pipefail
      LOG=/var/log/clive/backup.log
      DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
      echo "[${DATE}] Starting MinIO backup" >> $LOG
      rclone sync minio-local:clive-raw minio-backup:clive-raw-backup \
        --log-file $LOG --log-level INFO
      echo "[${DATE}] Backup complete" >> $LOG

- name: Schedule nightly backup cron job
  ansible.builtin.cron:
    name: clive-minio-backup
    user: clive
    hour: "2"
    minute: "0"
    job: /usr/local/bin/clive-backup
