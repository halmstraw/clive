---
- name: Update apt cache
  ansible.builtin.apt:
    update_cache: true
    cache_valid_time: 3600

- name: Upgrade all packages
  ansible.builtin.apt:
    upgrade: dist
    autoremove: true

- name: Install base packages
  ansible.builtin.apt:
    name:
      - ufw
      - fail2ban
      - unattended-upgrades
      - curl
      - git
      - htop
    state: present

- name: Configure unattended upgrades
  ansible.builtin.copy:
    dest: /etc/apt/apt.conf.d/20auto-upgrades
    content: |
      APT::Periodic::Update-Package-Lists "1";
      APT::Periodic::Unattended-Upgrade "1";
      APT::Periodic::AutocleanInterval "7";
    mode: "0640"

- name: Configure fail2ban SSH jail
  ansible.builtin.copy:
    dest: /etc/fail2ban/jail.local
    content: |
      [sshd]
      enabled  = true
      port     = ssh
      maxretry = 5
      bantime  = 3600
    mode: "0640"
  notify: Restart fail2ban

- name: Enable and start fail2ban
  ansible.builtin.systemd:
    name: fail2ban
    enabled: true
    state: started

- name: Set UFW default deny inbound
  community.general.ufw:
    default: deny
    direction: incoming

- name: Set UFW default allow outbound
  community.general.ufw:
    default: allow
    direction: outgoing

- name: Allow SSH from owner IP only
  community.general.ufw:
    rule: allow
    port: "22"
    proto: tcp
    src: "{{ owner_ip }}"

- name: Enable UFW
  community.general.ufw:
    state: enabled

- name: Configure NTP
  ansible.builtin.systemd:
    name: systemd-timesyncd
    enabled: true
    state: started

- name: Create clive service user
  ansible.builtin.user:
    name: clive
    shell: /bin/bash
    create_home: true
    system: false

- name: Create /etc/clive directory
  ansible.builtin.file:
    path: /etc/clive
    state: directory
    owner: clive
    group: clive
    mode: "0750"

- name: Create /data/clive directory
  ansible.builtin.file:
    path: /data/clive
    state: directory
    owner: clive
    group: clive
    mode: "0750"

- name: Configure logrotate for GitHub Actions runner diagnostics
  ansible.builtin.copy:
    dest: /etc/logrotate.d/clive-runner-diag
    content: |
      /home/clive/actions-runner/_diag/*.log {
          daily
          rotate 7
          compress
          missingok
          notifempty
          copytruncate
      }
    owner: root
    group: root
    mode: "0640"

- name: Install weekly Docker prune cron job
  ansible.builtin.cron:
    name: "clive docker prune"
    weekday: "0"
    hour: "3"
    minute: "0"
    user: root
    job: "docker system prune -f --filter 'until=168h' >> /var/log/clive-docker-prune.log 2>&1"

# ---------------------------------------------------------------------------
# Block 25 — Grafana Alloy config deployment
# D-117 superseded (2026-05-17): Alloy replaces self-hosted Prometheus+Loki+Grafana.
# The config.alloy file is copied from the repo into the compose directory tree
# so the Alloy container can mount it at /etc/alloy/config.alloy.
# Credentials are NOT in this file — they are injected via /etc/clive/secrets.env.
# ---------------------------------------------------------------------------

- name: Create Alloy config directory
  ansible.builtin.file:
    path: /home/clive/compose/observability/alloy
    state: directory
    owner: clive
    group: clive
    mode: "0750"

- name: Deploy Alloy config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/alloy/config.alloy"
    dest: /home/clive/compose/observability/alloy/config.alloy
    owner: clive
    group: clive
    mode: "0640"
