---
# All tasks in this role run as the clive user (day-2 play, become: false).
# owner:/group: attributes are omitted — files created by clive are owned by
# clive automatically. mode: is kept so chmod is applied correctly.

- name: Create compose directory
  ansible.builtin.file:
    path: /home/clive/compose
    state: directory
    mode: "0750"

- name: Create SQL init directory for postgres volume mount
  ansible.builtin.file:
    path: /home/clive/compose/sql/init
    state: directory
    mode: "0755" # NOSONAR — world-execute required for Docker container traversal

- name: Copy docker-compose.yml
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/docker-compose.yml"
    dest: /home/clive/compose/docker-compose.yml
    mode: "0644" # NOSONAR — world-read required: containers read via bind mount

- name: Copy SQL init files for postgres volume mount
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../sql/init/{{ item }}"
    dest: /home/clive/compose/sql/init/
    mode: "0644" # NOSONAR — world-read required: containers read via bind mount
  loop:
    - 01_extensions.sql
    - 02_schemas.sql
    - 03_roles.sql
    - 04_audit_table.sql
    - 05_application_tables.sql
    - 06_chunks_ingestion_columns.sql
    - 07_v03_tables.sql
    - 08_v04_tables.sql
    - 09_v06_tables.sql
    - 10_v07_memory_tables.sql
    - 10_v07_actions_tables.sql
    - 11_v07_pending_actions_metadata.sql

# ---------------------------------------------------------------------------
# Block 25 — Observability config (Grafana Cloud via Alloy)
# D-117 superseded 2026-05-17: self-hosted stack replaced by single Alloy container.
# ---------------------------------------------------------------------------

- name: Create observability config directories on VM
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    mode: "0755" # NOSONAR — world-execute required for Docker container traversal
  loop:
    - /home/clive/compose/observability
    - /home/clive/compose/observability/alloy
    - /home/clive/compose/observability/caddy

- name: Copy Alloy config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/alloy/config.alloy"
    dest: /home/clive/compose/observability/alloy/config.alloy
    mode: "0644" # NOSONAR — world-read required: alloy container reads via bind mount

- name: Copy Caddyfile
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/caddy/Caddyfile"
    dest: /home/clive/compose/observability/caddy/Caddyfile
    mode: "0644" # NOSONAR — world-read required: caddy container reads via bind mount

- name: Start Compose stack
  ansible.builtin.command:
    cmd: docker compose -f /home/clive/compose/docker-compose.yml up -d postgres minio
  changed_when: true

- name: Wait for MinIO to be healthy
  ansible.builtin.uri:
    url: http://localhost:9000/minio/health/live
    status_code: 200
  register: minio_health
  until: minio_health.status == 200
  retries: 12
  delay: 5

- name: Create MinIO raw store bucket
  ansible.builtin.shell: |
    docker run --rm \
      --network container:clive-minio \
      -e MC_HOST_local="http://{{ minio_root_user }}:{{ minio_root_password }}@localhost:9000" \
      minio/mc mb --ignore-existing "local/{{ minio_raw_bucket }}"
  register: mc_mb_result
  changed_when: '"Bucket created" in mc_mb_result.stdout'
