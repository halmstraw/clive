---
- name: Create compose directory
  ansible.builtin.file:
    path: /home/clive/compose
    state: directory
    owner: clive
    group: clive
    mode: "0750"

- name: Create SQL init directory for postgres volume mount
  ansible.builtin.file:
    path: /home/clive/compose/sql/init
    state: directory
    owner: clive
    group: clive
    mode: "0755"

- name: Copy docker-compose.yml
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/docker-compose.yml"
    dest: /home/clive/compose/docker-compose.yml
    owner: clive
    group: clive
    mode: "0644"

- name: Copy SQL init files for postgres volume mount
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../sql/init/{{ item }}"
    dest: /home/clive/compose/sql/init/
    owner: clive
    group: clive
    mode: "0644"
  loop:
    - 01_extensions.sql
    - 02_schemas.sql
    - 03_roles.sql
    - 04_audit_table.sql
    - 05_application_tables.sql

- name: Start Compose stack
  ansible.builtin.command:
    cmd: docker compose -f /home/clive/compose/docker-compose.yml up -d postgres minio
  become: true
  become_user: clive
  changed_when: true

- name: Wait for MinIO to be healthy
  ansible.builtin.uri:
    url: http://localhost:9000/minio/health/live
    status_code: 200
  register: minio_health
  until: minio_health.status == 200
  retries: 12
  delay: 5

- name: Create MinIO raw store bucket
  ansible.builtin.shell: |
    docker exec clive-minio mc alias set local http://localhost:9000 \
      "{{ minio_root_user }}" "{{ minio_root_password }}" --quiet
    docker exec clive-minio mc mb --ignore-existing "local/{{ minio_raw_bucket }}"
  become: true
  become_user: clive
  register: mc_mb_result
  changed_when: '"Bucket created" in mc_mb_result.stdout'
  no_log: true
