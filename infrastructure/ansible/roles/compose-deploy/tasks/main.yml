---
- name: Create compose directory
  ansible.builtin.file:
    path: /home/clive/compose
    state: directory
    owner: clive
    group: clive
    mode: "0750"

- name: Create SQL init directory for postgres volume mount
  ansible.builtin.file:
    path: /home/clive/compose/sql/init
    state: directory
    owner: clive
    group: clive
    mode: "0755"

- name: Copy docker-compose.yml
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../compose/docker-compose.yml"
    dest: /home/clive/compose/docker-compose.yml
    owner: clive
    group: clive
    mode: "0644"

- name: Copy SQL init files for postgres volume mount
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../sql/init/{{ item }}"
    dest: /home/clive/compose/sql/init/
    owner: clive
    group: clive
    mode: "0644"
  loop:
    - 01_extensions.sql
    - 02_schemas.sql
    - 03_roles.sql
    - 04_audit_table.sql
    - 05_application_tables.sql
    - 06_chunks_ingestion_columns.sql
    - 07_v03_tables.sql
    - 08_v04_tables.sql

- name: Create observability config directories on VM
  ansible.builtin.file:
    path: "{{ item }}"
    state: directory
    owner: clive
    group: clive
    mode: "0755"
  loop:
    - /home/clive/compose/observability
    - /home/clive/compose/observability/prometheus
    - /home/clive/compose/observability/prometheus/rules
    - /home/clive/compose/observability/loki
    - /home/clive/compose/observability/promtail
    - /home/clive/compose/observability/grafana
    - /home/clive/compose/observability/grafana/provisioning
    - /home/clive/compose/observability/grafana/provisioning/datasources
    - /home/clive/compose/observability/grafana/provisioning/dashboards
    - /home/clive/compose/observability/grafana/provisioning/alerting
    - /home/clive/compose/observability/grafana/dashboards
    - /home/clive/compose/observability/caddy

- name: Copy Prometheus config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/prometheus/prometheus.yml"
    dest: /home/clive/compose/observability/prometheus/prometheus.yml
    owner: clive
    group: clive
    mode: "0644"

- name: Copy Prometheus alert rules
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/prometheus/rules/{{ item }}"
    dest: /home/clive/compose/observability/prometheus/rules/
    owner: clive
    group: clive
    mode: "0644"
  loop:
    - services.yml
    - system.yml

- name: Copy Loki config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/loki/config.yml"
    dest: /home/clive/compose/observability/loki/config.yml
    owner: clive
    group: clive
    mode: "0644"

- name: Copy Promtail config
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/promtail/config.yml"
    dest: /home/clive/compose/observability/promtail/config.yml
    owner: clive
    group: clive
    mode: "0644"

- name: Copy Grafana provisioning — datasources
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/grafana/provisioning/datasources/datasources.yml"
    dest: /home/clive/compose/observability/grafana/provisioning/datasources/datasources.yml
    owner: clive
    group: clive
    mode: "0644"

- name: Copy Grafana provisioning — dashboard provider
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/grafana/provisioning/dashboards/dashboards.yml"
    dest: /home/clive/compose/observability/grafana/provisioning/dashboards/dashboards.yml
    owner: clive
    group: clive
    mode: "0644"

- name: Copy Grafana provisioning — alerting contact points
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/grafana/provisioning/alerting/contact_points.yml"
    dest: /home/clive/compose/observability/grafana/provisioning/alerting/contact_points.yml
    owner: clive
    group: clive
    mode: "0644"

- name: Copy Grafana dashboards
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/grafana/dashboards/system_overview.json"
    dest: /home/clive/compose/observability/grafana/dashboards/system_overview.json
    owner: clive
    group: clive
    mode: "0644"

- name: Copy Caddyfile
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../observability/caddy/Caddyfile"
    dest: /home/clive/compose/observability/caddy/Caddyfile
    owner: clive
    group: clive
    mode: "0644"

- name: Start Compose stack
  ansible.builtin.command:
    cmd: docker compose -f /home/clive/compose/docker-compose.yml up -d postgres minio
  become: true
  become_user: clive
  changed_when: true

- name: Wait for MinIO to be healthy
  ansible.builtin.uri:
    url: http://localhost:9000/minio/health/live
    status_code: 200
  register: minio_health
  until: minio_health.status == 200
  retries: 12
  delay: 5

- name: Create MinIO raw store bucket
  # minio/minio:latest no longer ships the mc binary — use the minio/mc image instead.
  # --network container:clive-minio shares the MinIO container's network so
  # localhost:9000 resolves correctly without exposing the port on the host.
  ansible.builtin.shell: |
    docker run --rm \
      --network container:clive-minio \
      -e MC_HOST_local="http://{{ minio_root_user }}:{{ minio_root_password }}@localhost:9000" \
      minio/mc mb --ignore-existing "local/{{ minio_raw_bucket }}"
  become: true
  become_user: clive
  register: mc_mb_result
  changed_when: '"Bucket created" in mc_mb_result.stdout'
