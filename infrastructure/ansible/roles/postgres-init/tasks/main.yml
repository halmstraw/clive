---
# All tasks run as the clive user (day-2 play, become: false).
# become_user: clive is omitted — we are already clive.

- name: Wait for PostgreSQL container to be healthy
  ansible.builtin.command:
    cmd: docker compose -f /home/clive/compose/docker-compose.yml exec -T postgres pg_isready -U postgres
  register: pg_ready
  until: pg_ready.rc == 0
  retries: 10
  delay: 5
  changed_when: false

- name: Create SQL staging directory
  ansible.builtin.file:
    path: /tmp/clive-sql
    state: directory
    mode: "0750"

- name: Copy SQL init files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../sql/init/{{ item }}"
    dest: "/tmp/clive-sql/"
    mode: "0644" # NOSONAR — world-read required: postgres container reads init scripts
  loop:
    - 01_extensions.sql
    - 02_schemas.sql
    - 03_roles.sql
    - 04_audit_table.sql
    - 05_application_tables.sql
    - 06_chunks_ingestion_columns.sql
    - 07_v03_tables.sql
    - 08_v04_tables.sql
    - 09_v06_tables.sql
    - 10_v07_memory_tables.sql
    - 10_v07_actions_tables.sql
    - 11_v07_pending_actions_metadata.sql

- name: Run SQL init scripts (idempotent)
  ansible.builtin.shell:
    cmd: "docker compose -f /home/clive/compose/docker-compose.yml exec -T postgres psql -U postgres -d clive < /tmp/clive-sql/{{ item }}"
  loop:
    - 01_extensions.sql
    - 02_schemas.sql
    - 03_roles.sql
    - 04_audit_table.sql
    - 05_application_tables.sql
    - 06_chunks_ingestion_columns.sql
    - 07_v03_tables.sql
    - 08_v04_tables.sql
    - 09_v06_tables.sql
    - 10_v07_memory_tables.sql
    - 10_v07_actions_tables.sql
    - 11_v07_pending_actions_metadata.sql
  changed_when: true

- name: Set clive_audit_writer password
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - /home/clive/compose/docker-compose.yml
      - exec
      - -T
      - postgres
      - psql
      - -U
      - postgres
      - -d
      - clive
      - -c
      - "ALTER ROLE clive_audit_writer PASSWORD '{{ audit_writer_password }}'"
  changed_when: true
  no_log: true

- name: Set clive_app password
  ansible.builtin.command:
    argv:
      - docker
      - compose
      - -f
      - /home/clive/compose/docker-compose.yml
      - exec
      - -T
      - postgres
      - psql
      - -U
      - postgres
      - -d
      - clive
      - -c
      - "ALTER ROLE clive_app PASSWORD '{{ app_db_password }}'"
  changed_when: true
  no_log: true
