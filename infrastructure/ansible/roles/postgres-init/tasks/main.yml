---
- name: Wait for PostgreSQL container to be healthy
  command: docker compose -f /home/clive/compose/docker-compose.yml exec -T postgres pg_isready -U postgres
  register: pg_ready
  until: pg_ready.rc == 0
  retries: 10
  delay: 5
  become_user: clive

- name: Copy SQL init files
  copy:
    src: "{{ item }}"
    dest: "/tmp/clive-sql/"
    owner: clive
    mode: "0644"
  loop:
    - 01_extensions.sql
    - 02_schemas.sql
    - 03_roles.sql
    - 04_audit_table.sql

- name: Run SQL init scripts (idempotent)
  command: >
    docker compose -f /home/clive/compose/docker-compose.yml
    exec -T postgres
    psql -U postgres -d clive -f /docker-entrypoint-initdb.d/{{ item }}
  loop:
    - 01_extensions.sql
    - 02_schemas.sql
    - 03_roles.sql
    - 04_audit_table.sql
  become_user: clive
