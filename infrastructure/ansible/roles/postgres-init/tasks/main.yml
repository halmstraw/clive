---
- name: Wait for PostgreSQL container to be healthy
  ansible.builtin.command:
    cmd: docker compose -f /home/clive/compose/docker-compose.yml exec -T postgres pg_isready -U postgres
  register: pg_ready
  until: pg_ready.rc == 0
  retries: 10
  delay: 5
  become: true
  become_user: clive
  changed_when: false

- name: Create SQL staging directory
  ansible.builtin.file:
    path: /tmp/clive-sql
    state: directory
    owner: clive
    mode: "0750"

- name: Copy SQL init files
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/../sql/init/{{ item }}"
    dest: "/tmp/clive-sql/"
    owner: clive
    mode: "0644"
  loop:
    - 01_extensions.sql
    - 02_schemas.sql
    - 03_roles.sql
    - 04_audit_table.sql
    - 05_application_tables.sql

- name: Run SQL init scripts (idempotent)
  ansible.builtin.shell:
    cmd: "docker compose -f /home/clive/compose/docker-compose.yml exec -T postgres psql -U postgres -d clive < /tmp/clive-sql/{{ item }}"
  loop:
    - 01_extensions.sql
    - 02_schemas.sql
    - 03_roles.sql
    - 04_audit_table.sql
    - 05_application_tables.sql
  become: true
  become_user: clive
  changed_when: true

- name: Set clive_audit_writer password
  ansible.builtin.shell:
    cmd: "docker compose -f /home/clive/compose/docker-compose.yml exec -T postgres psql -U postgres -d clive -c \"ALTER ROLE clive_audit_writer PASSWORD '{{ audit_writer_password }}'\""
  become: true
  become_user: clive
  changed_when: true
  no_log: true

- name: Set clive_app password
  ansible.builtin.shell:
    cmd: "docker compose -f /home/clive/compose/docker-compose.yml exec -T postgres psql -U postgres -d clive -c \"ALTER ROLE clive_app PASSWORD '{{ app_db_password }}'\""
  become: true
  become_user: clive
  changed_when: true
  no_log: true
