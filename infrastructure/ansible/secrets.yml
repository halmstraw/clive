---
# Targeted playbook for updating /etc/clive/secrets.env from the vault.
# Runs locally on the server (no SSH, no become/sudo required).
# /etc/clive/ is owned by the clive user — no root access needed.
# Used by the Ansible GitHub Actions workflow (workflow_dispatch only).
- name: Update CLIVE secrets
  hosts: localhost
  connection: local
  become: false
  vars_files:
    - vault.yml
  roles:
    - clive-secrets
