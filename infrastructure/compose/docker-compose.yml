x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:

  seed:
    build:
      context: ../../src/seed
      dockerfile: Dockerfile
    container_name: clive-seed
    restart: "no"
    env_file: /etc/clive/secrets.env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    logging: *default-logging
    networks:
      - clive-internal

  orchestrator:
    image: ghcr.io/halmstraw/clive-orchestrator:${ORCHESTRATOR_IMAGE_TAG:-latest}
    container_name: clive-orchestrator
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - CLIVE_ENV=production
      - CLIVE_ZONE=personal
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_ENDPOINT=http://minio:9000
      - TELEGRAM_SERVICE_URL=http://telegram:8082
      - DASHBOARD_SERVICE_URL=http://dashboard:8084
      - QUERY_SERVICE_URL=http://query:8081
      - PROCESSING_SERVICE_URL=http://processing:8083
      - SEARCH_API_PROVIDER=${SEARCH_API_PROVIDER:-brave}
    volumes:
      - /data/clive:/data/clive
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - clive-internal

  processing:
    image: ghcr.io/halmstraw/clive-processing:${PROCESSING_IMAGE_TAG:-latest}
    container_name: clive-processing
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - CLIVE_ENV=production
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_RAW_BUCKET=${MINIO_RAW_BUCKET:-clive-raw-store}
      - CLIVE_EMBEDDING_MODEL=text-embedding-3-small
    depends_on:
      orchestrator:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    networks:
      - clive-internal

  query:
    image: ghcr.io/halmstraw/clive-query:${QUERY_IMAGE_TAG:-latest}
    container_name: clive-query
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - CLIVE_ENV=production
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - CLIVE_LLM_MODEL=anthropic/claude-sonnet-4-20250514
    depends_on:
      orchestrator:
        condition: service_healthy
      postgres:                  # Block 8 writes llm_usage directly (D-125, v0.6)
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - clive-internal

  telegram:
    image: ghcr.io/halmstraw/clive-telegram:${TELEGRAM_IMAGE_TAG:-latest}
    container_name: clive-telegram
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - CLIVE_ENV=production
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_RAW_BUCKET=${MINIO_RAW_BUCKET:-clive-raw-store}
      - CLIVE_TIMEZONE=${CLIVE_TIMEZONE:-UTC}
    depends_on:
      orchestrator:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    logging: *default-logging
    networks:
      - clive-internal

  # ---------------------------------------------------------------------------
  # Block 2 — Web dashboard surface (v0.11, D-146)
  # Served publicly at clive.halmshaw.co.uk via Caddy reverse proxy.
  # Session auth via DASHBOARD_SECRET (secrets.env); DB-backed web_sessions table.
  # ---------------------------------------------------------------------------

  dashboard:
    image: ghcr.io/halmstraw/clive-dashboard:${DASHBOARD_IMAGE_TAG:-latest}
    container_name: clive-dashboard
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - CLIVE_ENV=production
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
    depends_on:
      orchestrator:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8084/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - clive-internal

  postgres:
    image: pgvector/pgvector:pg16
    container_name: clive-postgres
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - POSTGRES_DB=clive
      - POSTGRES_USER=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /home/clive/compose/sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "clive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging: *default-logging
    networks:
      - clive-internal

  minio:
    image: minio/minio:latest
    container_name: clive-minio
    restart: always
    env_file: /etc/clive/secrets.env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    logging: *default-logging
    networks:
      - clive-internal
    # Console (9001) and API (9000) intentionally not exposed on host
    # All access is container-network only

  backup:
    image: rclone/rclone:latest
    container_name: clive-backup
    restart: "no"
    volumes:
      - /etc/clive/rclone.conf:/root/.config/rclone/rclone.conf:ro
    command: >
      sync minio-local:${MINIO_RAW_BUCKET:-clive-raw-store} minio-backup:${MINIO_RAW_BUCKET:-clive-raw-store}-backup
      --log-level INFO
    logging: *default-logging
    networks:
      - clive-internal

  # ---------------------------------------------------------------------------
  # Block 25 — Observability stack (Phase 1)
  # D-117: Prometheus + Loki + Grafana + supporting exporters
  # D-118: Grafana alerts route to orchestrator webhook, not directly to Telegram
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:latest
    container_name: clive-prometheus
    restart: always
    volumes:
      - prometheus_data:/prometheus
      - /home/clive/compose/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /home/clive/compose/observability/prometheus/rules:/etc/prometheus/rules:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=15d'
      - '--web.enable-lifecycle'
    mem_limit: 200m
    logging: *default-logging
    networks:
      - clive-internal

  loki:
    image: grafana/loki:latest
    container_name: clive-loki
    restart: always
    volumes:
      - loki_data:/loki
      - /home/clive/compose/observability/loki:/etc/loki/conf:ro
    command: -config.file=/etc/loki/conf/config.yml
    healthcheck:
      test: ["CMD-SHELL", "wget -q --tries=1 --spider http://localhost:3100/ready || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    mem_limit: 512m
    logging: *default-logging
    networks:
      - clive-internal

  promtail:
    image: grafana/promtail:latest
    container_name: clive-promtail
    restart: always
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - /home/clive/compose/observability/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    mem_limit: 100m
    logging: *default-logging
    networks:
      - clive-internal

  grafana:
    image: grafana/grafana:latest
    container_name: clive-grafana
    restart: always
    volumes:
      - grafana_data:/var/lib/grafana
      - /home/clive/compose/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - /home/clive/compose/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    env_file: /etc/clive/secrets.env
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_HTTP_ADDR=0.0.0.0
      - GF_SERVER_ROOT_URL=https://grafana.halmshaw.co.uk
      - GF_SERVER_DOMAIN=grafana.halmshaw.co.uk
      - GF_AUTH_GOOGLE_ENABLED=true
      - GF_AUTH_GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GF_AUTH_GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - GF_AUTH_GOOGLE_SCOPES=https://www.googleapis.com/auth/userinfo.profile https://www.googleapis.com/auth/userinfo.email
      - GF_AUTH_GOOGLE_AUTH_URL=https://accounts.google.com/o/oauth2/auth
      - GF_AUTH_GOOGLE_TOKEN_URL=https://oauth2.googleapis.com/token
      - GF_AUTH_GOOGLE_ALLOWED_DOMAINS=gmail.com
      - GF_AUTH_GOOGLE_ALLOW_SIGN_UP=false
    mem_limit: 200m
    logging: *default-logging
    networks:
      - clive-internal

  # ---------------------------------------------------------------------------
  # D-121: Caddy reverse proxy — public HTTPS access to Grafana and dashboard
  # Caddy handles TLS automatically via Let's Encrypt.
  # Ports 80 and 443 must be open in the Hetzner firewall (see terraform/main.tf).
  # ---------------------------------------------------------------------------

  caddy:
    image: caddy:latest
    container_name: clive-caddy
    restart: always
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - caddy_data:/data
      - caddy_config:/config
      - /home/clive/compose/observability/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
    logging: *default-logging
    networks:
      - clive-internal
    deploy:
      resources:
        limits:
          memory: 64m

  node-exporter:
    image: prom/node-exporter:latest
    container_name: clive-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    mem_limit: 50m
    logging: *default-logging
    networks:
      - clive-internal

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: clive-postgres-exporter
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - DATA_SOURCE_NAME=postgresql://clive_app:${APP_DB_PASSWORD}@postgres:5432/clive?sslmode=disable
    mem_limit: 50m
    logging: *default-logging
    networks:
      - clive-internal

  # ---------------------------------------------------------------------------
  # Block 24 — Sandboxing stub (v1.0, D-152)
  # Gated behind the "experimental" Compose profile. NOT started by default.
  #
  # To start: docker compose --profile experimental up sandbox
  # Do NOT activate in production until Block 21 is formally unblocked (D-042).
  #
  # This service definition exists so that:
  #   (a) Block 21 (Evolution Engine) can be activated post-v1.0 without an
  #       infrastructure sprint to add a new service.
  #   (b) The sandbox image reference and resource limits are version-controlled.
  #   (c) IaC-readiness is verified in Compose dry-run CI.
  #
  # When Block 21 is activated, replace the placeholder image with the
  # concrete sandbox runner image and remove this comment block.
  # ---------------------------------------------------------------------------

  sandbox:
    image: ghcr.io/halmstraw/clive-sandbox:${SANDBOX_IMAGE_TAG:-stub}
    container_name: clive-sandbox
    restart: "no"
    profiles:
      - experimental
    env_file: /etc/clive/secrets.env
    environment:
      - CLIVE_ENV=experimental
      - SANDBOXING_ACTIVE=false
      - ORCHESTRATOR_URL=http://orchestrator:8080
    logging: *default-logging
    networks:
      - clive-internal
    mem_limit: 512m
    # No depends_on — sandbox starts independently when profile is activated.
    # Block 13 coordinates via event bridge (D-024) not service dependency.


volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  loki_data:
  grafana_data:
  caddy_data:
  caddy_config:

networks:
  clive-internal:
    driver: bridge
