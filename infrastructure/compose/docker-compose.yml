services:

  seed:
    build:
      context: ../../src/seed
      dockerfile: Dockerfile
    container_name: clive-seed
    restart: "no"
    env_file: /etc/clive/secrets.env
    environment:
      - POSTGRES_HOST=postgres
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - clive-internal

  orchestrator:
    image: ghcr.io/halmstraw/clive-orchestrator:${ORCHESTRATOR_IMAGE_TAG:-latest}
    container_name: clive-orchestrator
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - CLIVE_ENV=production
      - CLIVE_ZONE=personal
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - MINIO_ENDPOINT=http://minio:9000
      - TELEGRAM_SERVICE_URL=http://telegram:8082
      - QUERY_SERVICE_URL=http://query:8081
      - PROCESSING_SERVICE_URL=http://processing:8083
    volumes:
      - /data/clive:/data/clive
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - clive-internal

  processing:
    image: ghcr.io/halmstraw/clive-processing:${PROCESSING_IMAGE_TAG:-latest}
    container_name: clive-processing
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - CLIVE_ENV=production
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_RAW_BUCKET=${MINIO_RAW_BUCKET:-clive-raw-store}
      - CLIVE_EMBEDDING_MODEL=text-embedding-3-small
    depends_on:
      orchestrator:
        condition: service_healthy
      minio:
        condition: service_healthy
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - clive-internal

  query:
    image: ghcr.io/halmstraw/clive-query:${QUERY_IMAGE_TAG:-latest}
    container_name: clive-query
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - CLIVE_ENV=production
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - CLIVE_LLM_MODEL=anthropic/claude-sonnet-4-20250514
    depends_on:
      orchestrator:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - clive-internal

  telegram:
    image: ghcr.io/halmstraw/clive-telegram:${TELEGRAM_IMAGE_TAG:-latest}
    container_name: clive-telegram
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - CLIVE_ENV=production
      - ORCHESTRATOR_URL=http://orchestrator:8080
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_RAW_BUCKET=${MINIO_RAW_BUCKET:-clive-raw-store}
    depends_on:
      orchestrator:
        condition: service_healthy
      minio:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    networks:
      - clive-internal

  postgres:
    image: pgvector/pgvector:pg16
    container_name: clive-postgres
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - POSTGRES_DB=clive
      - POSTGRES_USER=postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - /home/clive/compose/sql/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "postgres", "-d", "clive"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    networks:
      - clive-internal

  minio:
    image: minio/minio:latest
    container_name: clive-minio
    restart: always
    env_file: /etc/clive/secrets.env
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - clive-internal
    # Console (9001) and API (9000) intentionally not exposed on host
    # All access is container-network only

  backup:
    image: rclone/rclone:latest
    container_name: clive-backup
    restart: "no"
    volumes:
      - /etc/clive/rclone.conf:/root/.config/rclone/rclone.conf:ro
    command: >
      sync minio-local:${MINIO_RAW_BUCKET:-clive-raw-store} minio-backup:${MINIO_RAW_BUCKET:-clive-raw-store}-backup
      --log-level INFO
    networks:
      - clive-internal

  # ---------------------------------------------------------------------------
  # Block 25 — Observability stack (Phase 1)
  # D-117: Prometheus + Loki + Grafana + supporting exporters
  # D-118: Grafana alerts route to orchestrator webhook, not directly to Telegram
  # ---------------------------------------------------------------------------

  prometheus:
    image: prom/prometheus:latest
    container_name: clive-prometheus
    restart: always
    volumes:
      - prometheus_data:/prometheus
      - /home/clive/compose/observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - /home/clive/compose/observability/prometheus/rules:/etc/prometheus/rules:ro
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.enable-lifecycle'
    mem_limit: 200m
    networks:
      - clive-internal

  loki:
    image: grafana/loki:latest
    container_name: clive-loki
    restart: always
    volumes:
      - loki_data:/loki
      - /home/clive/compose/observability/loki/config.yml:/etc/loki/config.yml:ro
    command: -config.file=/etc/loki/config.yml
    mem_limit: 400m
    networks:
      - clive-internal

  promtail:
    image: grafana/promtail:latest
    container_name: clive-promtail
    restart: always
    volumes:
      - /var/log:/var/log:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /home/clive/compose/observability/promtail/config.yml:/etc/promtail/config.yml:ro
    command: -config.file=/etc/promtail/config.yml
    mem_limit: 100m
    networks:
      - clive-internal

  grafana:
    image: grafana/grafana:latest
    container_name: clive-grafana
    restart: always
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - /home/clive/compose/observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - /home/clive/compose/observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_ADMIN_PASSWORD}
      - GF_SERVER_HTTP_ADDR=127.0.0.1
    mem_limit: 200m
    networks:
      - clive-internal

  node-exporter:
    image: prom/node-exporter:latest
    container_name: clive-node-exporter
    restart: always
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.rootfs=/rootfs'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    network_mode: host
    # node-exporter uses host network for accurate system metrics.
    # It must NOT be added to clive-internal as well — Docker does not allow both.
    mem_limit: 50m

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: clive-postgres-exporter
    restart: always
    env_file: /etc/clive/secrets.env
    environment:
      - DATA_SOURCE_NAME=postgresql://clive_app:${APP_DB_PASSWORD}@postgres:5432/clive?sslmode=disable
    mem_limit: 50m
    networks:
      - clive-internal

  cadvisor:
    image: gcr.io/cadvisor/cadvisor:latest
    container_name: clive-cadvisor
    restart: always
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    mem_limit: 150m
    networks:
      - clive-internal

volumes:
  postgres_data:
  minio_data:
  prometheus_data:
  loki_data:
  grafana_data:

networks:
  clive-internal:
    driver: bridge
