global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'orchestrator'
    static_configs:
      - targets: ['orchestrator:8080']
    metrics_path: /metrics

  - job_name: 'query'
    static_configs:
      - targets: ['query:8081']
    metrics_path: /metrics

  - job_name: 'telegram'
    static_configs:
      - targets: ['telegram:8082']
    metrics_path: /metrics

  - job_name: 'processing'
    static_configs:
      - targets: ['processing:8083']
    metrics_path: /metrics

  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres-exporter:9187']

  - job_name: 'node'
    static_configs:
      - targets: ['node-exporter:9100']

  - job_name: 'cadvisor'
    static_configs:
      - targets: ['cadvisor:8080']
