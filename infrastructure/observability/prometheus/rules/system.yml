groups:
  - name: clive_system
    rules:

      # Disk usage above 70% — warning
      - alert: DiskSpaceLow
        expr: |
          (
            1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"})
          ) > 0.70
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk usage above 70% on root filesystem"
          description: "Root filesystem is {{ $value | humanizePercentage }} full. Free space is running low."

      # Disk usage above 85% — critical
      - alert: DiskSpaceCritical
        expr: |
          (
            1 - (node_filesystem_avail_bytes{mountpoint="/",fstype!="tmpfs"} / node_filesystem_size_bytes{mountpoint="/",fstype!="tmpfs"})
          ) > 0.85
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Disk usage above 85% — intervention required"
          description: "Root filesystem is {{ $value | humanizePercentage }} full. Run docker system prune or expand disk immediately."

      # Memory usage above 85%
      - alert: MemoryUsageHigh
        expr: |
          (
            1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)
          ) > 0.85
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage above 85%"
          description: "VM memory usage is {{ $value | humanizePercentage }}. Risk of OOM if trend continues."

      # node-exporter itself is unreachable
      - alert: NodeExporterDown
        expr: up{job="node"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "node-exporter is down"
          description: "node-exporter has been unreachable for more than 2 minutes. Host metrics are unavailable."
