server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: docker_containers
    static_configs:
      - targets:
          - localhost
        labels:
          job: docker
          __path__: /var/lib/docker/containers/*/*-json.log

    pipeline_stages:
      - json:
          expressions:
            output: log
            stream: stream
            attrs:
      - json:
          source: attrs
          expressions:
            tag:
      - regex:
          source: tag
          expression: '^(?P<compose_service>[^|]+)\|(?P<container_name>[^|]+)$'
      - labels:
          compose_service:
          container_name:
          stream:
      - output:
          source: output

  - job_name: varlog
    static_configs:
      - targets:
          - localhost
        labels:
          job: varlog
          __path__: /var/log/*.log
