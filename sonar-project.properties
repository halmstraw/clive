sonar.projectKey=halmstraw_clive
sonar.projectName=CLIVE
sonar.organization=halmstraw

# Block until the Quality Gate result is available and fail the build if red.
# Without this the scan uploads results but never causes the CI job to fail (D-158).
sonar.qualitygate.wait=true

# Sources
sonar.sources=src
sonar.python.version=3.12

# Tests
sonar.tests=src/orchestrator/tests,src/query/tests,src/telegram/tests,src/processing/tests,src/dashboard/tests
sonar.exclusions=**/tests/**

# Coverage — one XML per service, generated by pytest-cov during CI
sonar.python.coverage.reportPaths=src/orchestrator/coverage.xml,src/query/coverage.xml,src/telegram/coverage.xml,src/processing/coverage.xml,src/dashboard/coverage.xml

# Suppress docker:S8541 for all Dockerfiles.
# uv sync installs editable local packages which have no pre-built wheel,
# so --no-build cannot be used. Dependencies are pinned via uv.lock and
# the build context is Docker-internal only — the risk is accepted.
sonar.issue.ignore.multicriteria=e1
sonar.issue.ignore.multicriteria.e1.ruleKey=docker:S8541
sonar.issue.ignore.multicriteria.e1.resourceKey=**/Dockerfile
