<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CLIVE Dashboard</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, monospace;
      background: #0f0f0f;
      color: #e0e0e0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    #app { display: none; flex-direction: column; height: 100vh; }
    #app.visible { display: flex; }
    #login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      gap: 16px;
    }
    #login-screen h1 { font-size: 2rem; letter-spacing: 0.1em; color: #7ee8a2; }
    #login-screen p { color: #888; font-size: 0.9rem; }
    .login-form { display: flex; flex-direction: column; gap: 10px; width: 320px; }
    input[type="password"] {
      padding: 10px 14px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 1rem;
    }
    button {
      padding: 10px 20px;
      border: none;
      border-radius: 6px;
      background: #7ee8a2;
      color: #0f0f0f;
      font-size: 0.95rem;
      font-weight: 600;
      cursor: pointer;
    }
    button:hover { background: #5dd68a; }
    button:disabled { background: #444; color: #888; cursor: not-allowed; }
    #login-error { color: #f87171; font-size: 0.85rem; min-height: 1.2em; }

    /* App layout */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 20px;
      border-bottom: 1px solid #222;
      background: #111;
    }
    header h1 { font-size: 1.2rem; color: #7ee8a2; letter-spacing: 0.08em; }
    .header-actions { display: flex; gap: 10px; align-items: center; }
    .badge {
      background: #ef4444;
      color: white;
      border-radius: 12px;
      padding: 2px 8px;
      font-size: 0.75rem;
      font-weight: 700;
    }
    .badge.hidden { display: none; }

    .tabs {
      display: flex;
      gap: 0;
      border-bottom: 1px solid #222;
      background: #111;
    }
    .tab {
      padding: 10px 20px;
      cursor: pointer;
      font-size: 0.9rem;
      color: #888;
      border-bottom: 2px solid transparent;
      transition: all 0.15s;
    }
    .tab.active { color: #7ee8a2; border-bottom-color: #7ee8a2; }
    .tab:hover { color: #e0e0e0; }

    .tab-content { flex: 1; overflow: hidden; display: none; }
    .tab-content.active { display: flex; flex-direction: column; }

    /* Query tab */
    #tab-query {
      flex-direction: column;
      height: calc(100vh - 100px);
    }
    #conversation {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .message {
      max-width: 700px;
      padding: 12px 16px;
      border-radius: 8px;
      line-height: 1.5;
      white-space: pre-wrap;
      font-size: 0.9rem;
    }
    .message.user {
      background: #1e3a5f;
      align-self: flex-end;
      color: #bde0ff;
    }
    .message.assistant {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      align-self: flex-start;
      color: #e0e0e0;
    }
    .message.system {
      background: #2a2a14;
      border: 1px solid #3a3a20;
      align-self: center;
      color: #d4c97a;
      font-size: 0.8rem;
      max-width: 500px;
      text-align: center;
    }
    .thinking {
      color: #555;
      font-style: italic;
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse { 0%, 100% { opacity: 0.4; } 50% { opacity: 1; } }

    .query-input-bar {
      padding: 16px 20px;
      border-top: 1px solid #222;
      display: flex;
      gap: 10px;
      background: #111;
    }
    #query-input {
      flex: 1;
      padding: 10px 14px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.95rem;
      resize: none;
      min-height: 42px;
      max-height: 120px;
    }
    #query-input:focus { outline: none; border-color: #7ee8a2; }

    /* Pending tab */
    #tab-pending { padding: 20px; gap: 12px; overflow-y: auto; }
    .pending-card {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 8px;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .pending-card h3 { font-size: 0.9rem; color: #7ee8a2; }
    .pending-card p { font-size: 0.85rem; color: #aaa; }
    .pending-card .expires { font-size: 0.75rem; color: #666; }
    .pending-card .actions { display: flex; gap: 8px; }
    .btn-confirm { background: #7ee8a2; color: #0f0f0f; font-size: 0.85rem; padding: 6px 16px; }
    .btn-cancel { background: #374151; color: #e0e0e0; font-size: 0.85rem; padding: 6px 16px; }
    .btn-cancel:hover { background: #4b5563; }
    #pending-empty { color: #555; font-style: italic; padding: 20px; }

    /* History tab */
    #tab-history { padding: 20px; gap: 12px; overflow-y: auto; }
    #history-conv-id {
      padding: 8px 12px;
      border: 1px solid #333;
      border-radius: 6px;
      background: #1a1a1a;
      color: #e0e0e0;
      font-size: 0.85rem;
      width: 340px;
    }
    .history-controls { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
    .history-turn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 0.85rem;
      white-space: pre-wrap;
    }
    .history-turn .role { font-size: 0.75rem; color: #7ee8a2; margin-bottom: 4px; }

    /* Logout */
    .btn-logout {
      background: transparent;
      border: 1px solid #444;
      color: #888;
      font-size: 0.8rem;
      padding: 5px 12px;
    }
    .btn-logout:hover { border-color: #888; color: #e0e0e0; background: transparent; }
  </style>
</head>
<body>

<!-- Login screen -->
<div id="login-screen">
  <h1>CLIVE</h1>
  <p>Enter your dashboard secret to continue</p>
  <div class="login-form">
    <input type="password" id="secret-input" placeholder="Dashboard secret" autofocus />
    <button id="login-btn" onclick="doLogin()">Sign in</button>
    <div id="login-error"></div>
  </div>
</div>

<!-- Main app -->
<div id="app">
  <header>
    <h1>CLIVE Dashboard</h1>
    <div class="header-actions">
      <span id="pending-badge" class="badge hidden">0 pending</span>
      <button class="btn-logout" onclick="doLogout()">Logout</button>
    </div>
  </header>

  <div class="tabs">
    <div class="tab active" role="button" tabindex="0" onclick="switchTab('query')" onkeydown="if(event.key==='Enter'||event.key===' ')switchTab('query')">Query</div>
    <div class="tab" role="button" tabindex="0" onclick="switchTab('pending')" onkeydown="if(event.key==='Enter'||event.key===' ')switchTab('pending')">Pending Actions</div>
    <div class="tab" role="button" tabindex="0" onclick="switchTab('history')" onkeydown="if(event.key==='Enter'||event.key===' ')switchTab('history')">History</div>
  </div>

  <!-- Query tab -->
  <div id="tab-query" class="tab-content active">
    <div id="conversation"></div>
    <div class="query-input-bar">
      <textarea id="query-input" placeholder="Ask CLIVE anything..." rows="1"
        onkeydown="handleKeyDown(event)"></textarea>
      <button id="send-btn" onclick="sendQuery()">Send</button>
    </div>
  </div>

  <!-- Pending Actions tab -->
  <div id="tab-pending" class="tab-content">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <h2 style="font-size:1rem;color:#888">Pending Confirmations</h2>
      <button style="font-size:0.8rem;padding:5px 12px;background:#1a1a1a;color:#888;border:1px solid #333" onclick="loadPending()">Refresh</button>
    </div>
    <div id="pending-list"><p id="pending-empty" style="color:#555;font-style:italic">No pending actions.</p></div>
  </div>

  <!-- History tab -->
  <div id="tab-history" class="tab-content">
    <div class="history-controls">
      <input id="history-conv-id" placeholder="Conversation ID (UUID)" />
      <button style="font-size:0.85rem;padding:7px 14px" onclick="loadHistory()">Load</button>
    </div>
    <div id="history-list"></div>
  </div>
</div>

<script>
  let conversationId = null;
  let pollInterval = null;
  let pendingPollInterval = null;

  // ---- Login / Logout ----

  async function doLogin() {
    const secret = document.getElementById('secret-input').value;
    const errEl = document.getElementById('login-error');
    errEl.textContent = '';
    document.getElementById('login-btn').disabled = true;
    try {
      const r = await fetch('/auth/login', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({secret}),
        credentials: 'same-origin',
      });
      if (r.ok) {
        document.getElementById('login-screen').style.display = 'none';
        document.getElementById('app').classList.add('visible');
        startPendingPoll();
      } else {
        const d = await r.json();
        errEl.textContent = d.error || 'Login failed';
        document.getElementById('login-btn').disabled = false;
      }
    } catch(e) {
      errEl.textContent = 'Network error';
      document.getElementById('login-btn').disabled = false;
    }
  }

  async function doLogout() {
    await fetch('/auth/logout', {method:'POST', credentials:'same-origin'});
    location.reload();
  }

  document.getElementById('secret-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });

  // ---- Tab switching ----

  function switchTab(name) {
    document.querySelectorAll('.tab').forEach((t,i) => {
      t.classList.toggle('active', ['query','pending','history'][i] === name);
    });
    document.querySelectorAll('.tab-content').forEach((c,i) => {
      c.classList.toggle('active', ['tab-query','tab-pending','tab-history'][i] === 'tab-' + name);
    });
    if (name === 'pending') loadPending();
  }

  // ---- Query ----

  function handleKeyDown(e) {
    if (e.key === 'Enter' && !e.shiftKey) {
      e.preventDefault();
      sendQuery();
    }
  }

  function addMessage(role, text) {
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.textContent = text;
    document.getElementById('conversation').appendChild(div);
    div.scrollIntoView({behavior:'smooth'});
    return div;
  }

  async function sendQuery() {
    const input = document.getElementById('query-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    document.getElementById('send-btn').disabled = true;

    addMessage('user', text);
    const thinkingEl = addMessage('assistant', '…');
    thinkingEl.classList.add('thinking');

    if (!conversationId) conversationId = crypto.randomUUID();

    try {
      const r = await fetch('/api/query', {
        method: 'POST',
        headers: {'Content-Type':'application/json'},
        body: JSON.stringify({input_text: text, conversation_id: conversationId}),
        credentials: 'same-origin',
      });
      if (!r.ok) {
        thinkingEl.classList.remove('thinking');
        thinkingEl.textContent = 'Error submitting query. Try again.';
        document.getElementById('send-btn').disabled = false;
        return;
      }
      // Poll for response
      pollForResponse(conversationId, thinkingEl);
    } catch(e) {
      thinkingEl.classList.remove('thinking');
      thinkingEl.textContent = 'Network error.';
      document.getElementById('send-btn').disabled = false;
    }
  }

  function pollForResponse(convId, thinkingEl) {
    let attempts = 0;
    const MAX_ATTEMPTS = 60; // 60s timeout
    const iv = setInterval(async () => {
      attempts++;
      if (attempts > MAX_ATTEMPTS) {
        clearInterval(iv);
        thinkingEl.classList.remove('thinking');
        thinkingEl.textContent = 'Response timeout. Please try again.';
        document.getElementById('send-btn').disabled = false;
        return;
      }
      try {
        const r = await fetch(`/api/response?conversation_id=${encodeURIComponent(convId)}`, {
          credentials: 'same-origin',
        });
        if (r.status === 200) {
          clearInterval(iv);
          const d = await r.json();
          thinkingEl.classList.remove('thinking');
          thinkingEl.textContent = d.response_text || '(no response)';
          document.getElementById('send-btn').disabled = false;
        }
        // 202 = still pending, keep polling
      } catch(e) { /* keep polling */ }
    }, 1000);
  }

  // ---- Pending Actions ----

  function startPendingPoll() {
    loadPending();
    pendingPollInterval = setInterval(loadPending, 15000);
  }

  async function loadPending() {
    try {
      const r = await fetch('/api/pending', {credentials:'same-origin'});
      if (r.status === 401) { location.reload(); return; }
      if (!r.ok) return;
      const d = await r.json();
      renderPending(d.actions || []);
    } catch(e) {}
  }

  function renderPending(actions) {
    const list = document.getElementById('pending-list');
    const badge = document.getElementById('pending-badge');

    if (actions.length === 0) {
      list.innerHTML = '<p style="color:#555;font-style:italic">No pending actions.</p>';
      badge.classList.add('hidden');
      return;
    }

    badge.textContent = `${actions.length} pending`;
    badge.classList.remove('hidden');

    list.innerHTML = '';
    actions.forEach(a => {
      const card = document.createElement('div');
      card.className = 'pending-card';
      const expires = new Date(a.expires_at).toLocaleTimeString();
      card.innerHTML = `
        <h3>${escapeHtml(a.action_type)}</h3>
        <p>${escapeHtml(a.action_description || a.action_target || '')}</p>
        <span class="expires">Expires: ${expires}</span>
        <div class="actions">
          <button class="btn-confirm" onclick="confirmAction('${a.action_request_id}')">Confirm</button>
          <button class="btn-cancel" onclick="cancelAction('${a.action_request_id}')">Cancel</button>
        </div>
      `;
      list.appendChild(card);
    });
  }

  async function confirmAction(id) {
    await fetch(`/api/confirm/${encodeURIComponent(id)}`, {
      method:'POST', credentials:'same-origin'
    });
    setTimeout(loadPending, 500);
  }

  async function cancelAction(id) {
    await fetch(`/api/cancel/${encodeURIComponent(id)}`, {
      method:'POST', credentials:'same-origin'
    });
    setTimeout(loadPending, 500);
  }

  // ---- History ----

  async function loadHistory() {
    const convId = document.getElementById('history-conv-id').value.trim();
    if (!convId) return;
    const list = document.getElementById('history-list');
    list.innerHTML = '<p style="color:#555;font-style:italic">Loading…</p>';
    try {
      const r = await fetch('/api/history', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({conversation_id: convId, limit: 50}),
        credentials:'same-origin',
      });
      if (!r.ok) {
        list.innerHTML = '<p style="color:#f87171">Failed to load history.</p>';
        return;
      }
      const d = await r.json();
      const turns = d.turns || [];
      if (turns.length === 0) {
        list.innerHTML = '<p style="color:#555;font-style:italic">No turns found for this conversation.</p>';
        return;
      }
      list.innerHTML = '';
      turns.forEach(t => {
        const div = document.createElement('div');
        div.className = 'history-turn';
        div.innerHTML = `<div class="role">${escapeHtml(t.role)}</div>${escapeHtml(t.content)}`;
        list.appendChild(div);
      });
    } catch(e) {
      list.innerHTML = '<p style="color:#f87171">Network error.</p>';
    }
  }

  // ---- Utilities ----

  function escapeHtml(s) {
    return String(s || '').replaceAll('&','&amp;').replaceAll('<','&lt;').replaceAll('>','&gt;');
  }
</script>
</body>
</html>
